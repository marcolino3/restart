apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # cert-manager ClusterIssuer (Let's Encrypt prod)
  - cluster-issuer.yaml

  # Postgres läuft als externe VM (Infomaniak Public Cloud Instance) statt CNPG,
  # weil das Infomaniak Managed K8s den kube-apiserver-VIP (10.96.0.1) nicht
  # zuverlässig aus den Pods routet — CNPG initdb timeouted dauerhaft.
  # DB-Host steht in backend-secrets (DB_HOST=<floating-ip>).

  # Backend
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/serviceaccount.yaml
  - backend/configmap.yaml
  - backend/hpa.yaml
  - backend/pdb.yaml

  # Frontend
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/serviceaccount.yaml
  - frontend/configmap.yaml
  - frontend/hpa.yaml
  - frontend/pdb.yaml

  # Network Policies (default-deny + explizite Allows)
  - network-policies/default-deny.yaml
  - network-policies/allow-dns.yaml
  - network-policies/frontend.yaml
  - network-policies/backend.yaml
  - network-policies/migrate-job.yaml
