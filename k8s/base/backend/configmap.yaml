apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  NODE_ENV: "production"
  PORT: "3001"
  DB_PORT: "5432"
  DB_NAME: "restart"
  BCRYPT_ROUNDS: "10"
  JWT_ACCESS_TOKEN_EXPIRATION_MS: "36000000"
  JWT_REFRESH_TOKEN_EXPIRATION_MS: "604800000"
  DB_SYNCHRONIZE: "false"
  LOG_LEVEL: "info"
  # SENTRY_DSN, SENTRY_ENVIRONMENT, SENTRY_RELEASE kommen aus backend-secrets
  # bzw. werden im Deploy-Workflow gesetzt. tracesSampleRate hier konfigurierbar:
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  SENTRY_PROFILES_SAMPLE_RATE: "0.1"
