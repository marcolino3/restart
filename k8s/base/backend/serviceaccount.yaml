apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  labels:
    app: backend
# Bewusst kein Token-Auto-Mount: das Backend braucht keine K8s-API.
# Wenn ein Pod doch mal mit der API sprechen müsste, gezielt enablen
# UND via Role/RoleBinding minimal scopen.
automountServiceAccountToken: false
