# CloudNativePG-Postgres-Pods: Egress zum K8s-API-Server + DNS + intra-cluster.
# Ohne diese Policy blockt default-deny-all den initdb-Prozess, der den
# API-Server erreichen muss um den Cluster-Status zu synchronisieren.
#
# Ingress: backend + migrate-job dürfen auf 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-policy
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: restart-db
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Backend-Pods → Postgres
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 5432
    # Migrate-Job → Postgres
    - from:
        - podSelector:
            matchLabels:
              component: migration
      ports:
        - protocol: TCP
          port: 5432
    # Intra-CNPG-Cluster (replicas reden untereinander)
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: restart-db
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # K8s-API-Server (initdb/operator-checks) — ipBlock 0.0.0.0/0
    # ohne except, weil 10.96.0.1 (kube-apiserver-VIP) im Cluster-internen
    # Bereich liegt. Egress nur auf Port 443 ist eng genug.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Cluster-internal CNPG-replica-Traffic auf 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
