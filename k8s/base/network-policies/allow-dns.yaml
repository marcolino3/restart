# DNS muss IMMER erlaubt sein — sonst kann kein Pod Service-Namen auflösen.
# Erlaubt UDP/TCP auf Port 53 in den kube-system Namespace (CoreDNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            # Infomaniak Managed K8s nutzt Label `k8s-app: coredns`,
            # nicht den Vanilla-K8s-Default `k8s-app: kube-dns`.
            # matchExpressions In-List ist robust gegen beide.
            matchExpressions:
              - key: k8s-app
                operator: In
                values: ["kube-dns", "coredns"]
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
