# Migration-Job: gleicher Egress wie Backend (er braucht DB-Zugriff,
# Sentry-Egress optional). Kein Ingress nötig — niemand spricht den Job an.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: migrate-job-policy
spec:
  podSelector:
    matchLabels:
      component: migration
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
