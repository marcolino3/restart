# Migration-Job: braucht nur DB-Zugriff (PostgreSQL). Kein Ingress nötig —
# niemand spricht den Job an.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: migrate-job-policy
spec:
  podSelector:
    matchLabels:
      component: migration
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
