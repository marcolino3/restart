apiVersion: batch/v1
kind: Job
metadata:
  # Name + Image werden zur Deploy-Zeit per `envsubst` ersetzt, damit jeder
  # Deploy einen eigenen Job bekommt (Jobs sind immutable und Namen müssen
  # eindeutig sein, sonst schlägt `kubectl apply` fehl).
  # JOB_NAME_SUFFIX = 12-char SHA (k8s-Namen ≤ 63 chars); IMAGE_TAG = voller SHA
  # damit das Image gefunden wird (Build pusht :${{ github.sha }}).
  name: migrate-${JOB_NAME_SUFFIX}
  labels:
    app: backend
    component: migration
spec:
  # Nach 6h Lifetime aufräumen, damit der Namespace nicht mit alten Migration-Jobs vollläuft.
  ttlSecondsAfterFinished: 21600
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: backend
        component: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-secret
      # Same hardened context as the backend deployment — identical image,
      # the job only talks to Postgres (KSV-0118).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/${IMAGE_OWNER}/restart-backend:${IMAGE_TAG}
          command: ["node", "dist/src/migrate.js"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
