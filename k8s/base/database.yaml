apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: restart-db
spec:
  # Staging: 1 Instanz reicht. Production: auf 3 setzen (Primary + 2 Replicas)
  instances: 1

  # Echtes PostgreSQL 16 (offizielles CNPG-Image, regelmaessig gepatcht)
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4

  # App-Datenbank + App-User werden initial via initdb erzeugt.
  # CloudNativePG erzeugt automatisch ein Secret `restart-db-app` mit:
  #   username, password, host, port, dbname, jdbc-uri, uri (= DATABASE_URL)
  bootstrap:
    initdb:
      database: restart
      owner: restart
      # postInitSQL läuft als superuser nach initdb — gute Stelle für Extensions
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        - CREATE EXTENSION IF NOT EXISTS "pgcrypto";
        - CREATE EXTENSION IF NOT EXISTS "pg_trgm";

  # Persistent Storage über Infomaniak Public Cloud Block Storage
  storage:
    size: 10Gi
    storageClass: csi-cinder-high-speed # Infomaniak default-class

  # Production-Settings — fuer Staging konservativ
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  # Monitoring-Endpoint fuer Prometheus
  monitoring:
    enablePodMonitor: false # spaeter aktivieren, wenn Prometheus laeuft

  # Backups: vorerst keine externen S3-Backups konfiguriert.
  # Spaeter mit Infomaniak Swiss Backup S3 zubuchen, dann hier ergaenzen:
  # backup:
  #   barmanObjectStore:
  #     destinationPath: s3://restart-backups/staging
  #     endpointURL: https://s3.pub1.infomaniak.cloud
  #     ...
