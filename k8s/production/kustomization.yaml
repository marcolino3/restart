apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: restart-production

resources:
  - ../base
  - ingress.yaml
  # SealedSecrets — Bootstrap-Schritte siehe DEPLOYMENT.md (Production-Runbook).
  # Erzeugen via `./scripts/bootstrap-secrets.sh production`; sobald die Dateien
  # existieren, hier einkommentieren (vorher schlägt `kustomize build` fehl):
  #   - sealed-secrets/backend-secrets.yaml
  #   - sealed-secrets/frontend-secrets.yaml

# Production nutzt die Base-Defaults für HPA (min 2 / max 5) und PDB (minAvailable 1).
# Die Deployment.replicas in der Base sind der Startwert; HPA übernimmt danach.

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - NODE_ENV=production
      # Vor dem ersten Prod-Deploy auf den echten Prod-Postgres-Host setzen
      # (separate CH-DB, NICHT die Staging-DB) — siehe DEPLOYMENT.md.
      - DB_HOST=PRODUCTION_DB_HOST_PLACEHOLDER
      # Schema nur über Migrationen; synchronize ist per app.module-Guard
      # in production zusätzlich hart gesperrt.
      - DB_SYNCHRONIZE=false
      - ALLOWED_ORIGINS=https://app.colibri-app.ch
      - GOOGLE_AUTH_REDIRECT_URI=https://app.colibri-app.ch/api/auth/google/callback
      - AUTH_UI_REDIRECT=https://app.colibri-app.ch
      - LOG_LEVEL=info
