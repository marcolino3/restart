apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: restart-staging

resources:
  - ../base
  - ingress.yaml
  - sealed-secrets/backend-secrets.yaml
  - sealed-secrets/frontend-secrets.yaml

patches:
  # HPA: staging fährt kleiner — 1 bis 2 Replicas reichen für Smoketests.
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

  # PDB: bei nur 1 Pod blockiert minAvailable=1 alle Node-Drains.
  # Auf maxUnavailable=1 umstellen, damit Cluster-Upgrades durchgehen können.
  - target:
      kind: PodDisruptionBudget
      name: backend-pdb
    patch: |
      - op: remove
        path: /spec/minAvailable
      - op: add
        path: /spec/maxUnavailable
        value: 1
  - target:
      kind: PodDisruptionBudget
      name: frontend-pdb
    patch: |
      - op: remove
        path: /spec/minAvailable
      - op: add
        path: /spec/maxUnavailable
        value: 1

  # Initial-Replicas auf 1 (HPA wird sie ggf. anpassen).
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - DB_HOST=postgres-postgresql.restart-staging.svc.cluster.local
      # Schema wird ausschliesslich ueber Migrationen verwaltet (InitialSchema-
      # Baseline + inkrementelle). synchronize ist hier hart deaktiviert — der
      # app.module-Guard bricht den Boot ab, falls jemand es doch auf true setzt.
      # ACHTUNG: Beim Umstieg von synchronize auf Migrationen muss die bestehende
      # Staging-DB einmalig geleert werden (nur Testdaten), siehe DEPLOYMENT.md.
      - DB_SYNCHRONIZE=false
      - ALLOWED_ORIGINS=https://staging.colibri-app.ch
      - GOOGLE_AUTH_REDIRECT_URI=https://staging.colibri-app.ch/api/auth/google/callback
      - AUTH_UI_REDIRECT=https://staging.colibri-app.ch
      - LOG_LEVEL=info
