apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restart-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # HTTPS erzwingen (HTTP → 308 Redirect).
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Maximale Body-Size für Uploads (Bilder/CSV-Imports). 10 MB ist großzügig
    # für die aktuellen Use-Cases; bei Bedarf hochsetzen.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Generelle Connection-Limits gegen einfache DoS.
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "600"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Security-Header: bewusst in Next.js (next.config.ts) statt im Ingress,
    # weil moderne nginx-ingress 'snippet'-Annotations standardmässig deaktiviert
    # (CVE-2023-5043). Für Production ggf. ControllerConfig anpassen.
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.colibri-app.ch
      secretName: staging-tls
  rules:
    - host: staging.colibri-app.ch
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
