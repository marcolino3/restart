version: 2
updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    # One grouped PR for all minor+patch (dev + prod) to keep PR volume low.
    # Majors still open individually so they get manual review.
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      # NativeWind (apps/mobile) ist an Tailwind 3 gebunden — Tailwind 4 bricht die JS-Config-Auflösung
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]

  # Backend
  - package-ecosystem: "npm"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps,backend)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Bewusste Pins (siehe MEMORY.md „Bekannte Issues")
      - dependency-name: "class-validator"
        versions: [">=0.15.0"]
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # TypeORM 1.0 = Datenschicht-Major, braucht dedizierten Migrations-PR
      - dependency-name: "typeorm"
        versions: [">=1.0.0"]

  # Frontend
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps,web)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Bewusste Pins (siehe MEMORY.md „Bekannte Issues")
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "@swc/cli"
        versions: [">=0.8.0"]
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # Codegen 7: Dokument-Parser bricht auf bestehenden TS-Files
      # (Missing initializer in const declaration) — Major braucht eigene Migration
      - dependency-name: "@graphql-codegen/cli"
        versions: [">=7.0.0"]

  # E2E
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "e2e"
    commit-message:
      prefix: "chore(deps,e2e)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps,ci)"
    groups:
      actions:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps,docker)"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps,docker)"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps,terraform)"
    ignore:
      # Provider-Majors brauchen terraform-plan-Review (CI-blind) — nicht auto-bumpen
      - dependency-name: "hashicorp/helm"
        versions: [">=3.0.0"]
      - dependency-name: "hashicorp/kubernetes"
        versions: [">=3.0.0"]
