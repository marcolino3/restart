version: 2
updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-patches:
        dependency-type: "production"
        update-types:
          - "patch"

  # Backend
  - package-ecosystem: "npm"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps,backend)"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
      typeorm:
        patterns:
          - "typeorm"
          - "@nestjs/typeorm"
        update-types:
          - "minor"
          - "patch"
      passport:
        patterns:
          - "passport*"
        update-types:
          - "minor"
          - "patch"
      graphql:
        patterns:
          - "graphql"
          - "@apollo/*"
          - "@nestjs/apollo"
          - "@nestjs/graphql"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Bekannte Inkompatibilitäten (siehe Memory)
      - dependency-name: "class-validator"
        versions: [">=0.15.0"]

  # Frontend
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps,web)"
    groups:
      next:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
        update-types:
          - "minor"
          - "patch"
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      radix:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
      graphql:
        patterns:
          - "graphql"
          - "graphql-*"
          - "@graphql-codegen/*"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "@swc/cli"
        versions: [">=0.8.0"]

  # E2E
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "e2e"
    commit-message:
      prefix: "chore(deps,e2e)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps,ci)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps,docker)"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps,docker)"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps,terraform)"