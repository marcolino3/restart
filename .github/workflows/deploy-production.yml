name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (commit SHA). Leer lassen → promotet, was aktuell auf Staging läuft."
        required: false
        default: ""
      skip_migrations:
        description: "Skip DB migration job (NUR im Notfall — überspringen führt zu Schema-Drift)"
        type: boolean
        required: false
        default: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-frontend
  NAMESPACE: restart-production
  STAGING_NAMESPACE: restart-staging

# Serialisiert Prod-Deploys — verhindert, dass zwei parallele Promotions
# überlappende Rollouts fahren und den Cluster in einen inkonsistenten Zustand
# bringen. Nicht abbrechen, damit ein laufender Migrate/Rollout sauber endet.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve & Validate Promotion Target
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      current_prod_tag: ${{ steps.current.outputs.current_prod_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          # Volle History für `git log` im Promotion-Summary.
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # Auto-Resolve: wenn der Operator keinen image_tag (oder den Alias
      # 'latest'/'staging') angibt, ziehen wir die SHA, die JETZT auf Staging
      # läuft — das ist die einzige verlässliche "was wurde getestet" Aussage.
      - name: Resolve target image tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          set -e
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ] || [ "$TAG" = "latest" ] || [ "$TAG" = "staging" ]; then
            echo "::notice::Resolving from staging cluster ($STAGING_NAMESPACE/backend)…"
            IMAGE=$(kubectl get deployment backend -n "$STAGING_NAMESPACE" \
              -o jsonpath='{.spec.template.spec.containers[0].image}')
            TAG="${IMAGE##*:}"
            if [ -z "$TAG" ] || [ "$TAG" = "latest" ]; then
              echo "::error::Staging-Deployment trägt keinen pinned SHA-Tag (gefunden: '$TAG'). Promotion abgebrochen."
              exit 1
            fi
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "::notice::Promotion target: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Vorab-Validierung: beide Images müssen in GHCR existieren, sonst
      # bricht der migrate-Job mitten im Apply mit unklarer Fehlermeldung ab.
      - name: Validate images exist in GHCR
        env:
          TAG: ${{ steps.resolve.outputs.image_tag }}
        run: |
          set -e
          for IMG in "${{ env.BACKEND_IMAGE }}" "${{ env.FRONTEND_IMAGE }}"; do
            if ! docker buildx imagetools inspect "$IMG:$TAG" > /dev/null 2>&1; then
              echo "::error::Image nicht in GHCR gefunden: $IMG:$TAG"
              exit 1
            fi
            echo "::notice::OK $IMG:$TAG"
          done

      # Aktuell auf Produktion laufende SHA für den Diff.
      - name: Read current production tag
        id: current
        run: |
          IMAGE=$(kubectl get deployment backend -n "$NAMESPACE" \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          CURRENT_TAG="${IMAGE##*:}"
          if [ -z "$CURRENT_TAG" ]; then
            CURRENT_TAG="(none)"
          fi
          echo "current_prod_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "::notice::Current production: $CURRENT_TAG"

      # Promotion-Summary in den Step-Summary-Tab schreiben (oben im UI sichtbar).
      - name: Write promotion summary
        env:
          TARGET: ${{ steps.resolve.outputs.image_tag }}
          CURRENT: ${{ steps.current.outputs.current_prod_tag }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations }}
        run: |
          {
            echo "## 🚀 Production Promotion"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Target SHA** | \`$TARGET\` |"
            echo "| **Current Prod SHA** | \`$CURRENT\` |"
            echo "| **Operator** | @${{ github.actor }} |"
            echo "| **Migrations** | $([ "$SKIP_MIGRATIONS" = "true" ] && echo "⚠️ SKIPPED" || echo "Will run") |"
            echo ""
            if [ "$CURRENT" = "$TARGET" ]; then
              echo "ℹ️  Target = Current — Promotion ist no-op (rollout wird angestossen, ändert aber nichts)."
            elif [ "$CURRENT" = "(none)" ]; then
              echo "ℹ️  Erstes Deployment — kein Diff vorhanden."
            else
              echo "### Commits between current prod and target"
              echo ""
              # Falls SHAs nicht reachable sind (z.B. force-push gelöscht), nicht abbrechen.
              echo '```'
              git log --oneline --no-decorate "$CURRENT".."$TARGET" 2>/dev/null \
                || echo "(Diff nicht ermittelbar — SHAs nicht in History reachable.)"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  migrate:
    name: Run DB Migrations
    needs: [resolve]
    runs-on: ubuntu-latest
    environment: production
    if: ${{ !inputs.skip_migrations }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # Siehe deploy-staging.yml: privater GHCR-Pull braucht ghcr-secret.
      # Bei jedem Deploy frisch aus dem PAT (read:packages) erzeugt.
      - name: Ensure GHCR image pull secret
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "::error::GHCR_PULL_TOKEN is not set. Create a classic PAT with read:packages scope and add it as the GHCR_PULL_TOKEN repository secret."
            exit 1
          fi
          OWNER_LC=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="$OWNER_LC" \
            --docker-password="$GHCR_PULL_TOKEN" \
            -n "$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -n "$NAMESPACE" -f -
          echo "::notice::ghcr-secret ensured in $NAMESPACE"

      - name: Apply migration job
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          RESOLVED_TAG: ${{ needs.resolve.outputs.image_tag }}
        run: |
          export IMAGE_OWNER=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          # Job-Suffix: Tag in Kleinbuchstaben, auf 12 Zeichen gekürzt (k8s Name-Limit).
          JOB_SUFFIX=$(echo "$RESOLVED_TAG" | cut -c1-12 | tr '[:upper:]' '[:lower:]')
          # migrate-job.yaml hat ${IMAGE_TAG} an zwei Stellen (Job-Name + Image-Tag).
          # Wir brauchen für den Job-Namen das gekürzte Suffix, für das Image den
          # vollen Tag — daher zuerst envsubst mit gekürztem Wert, dann sed.
          export IMAGE_TAG="$JOB_SUFFIX"
          JOB_NAME="migrate-${JOB_SUFFIX}"
          envsubst < k8s/base/jobs/migrate-job.yaml \
            | sed "s|restart-backend:${JOB_SUFFIX}|restart-backend:${RESOLVED_TAG}|g" \
            | kubectl apply -n "$NAMESPACE" -f -

          echo "Waiting for $JOB_NAME to complete…"
          for i in $(seq 1 120); do
            COMPLETE=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" \
              -o 'jsonpath={.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
            FAILED=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" \
              -o 'jsonpath={.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")
            if [ "$COMPLETE" = "True" ]; then
              echo "::notice::Production migrations applied"
              kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=50 || true
              exit 0
            fi
            if [ "$FAILED" = "True" ]; then
              echo "::error::Production migration FAILED — rollout aborted"
              kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=200 || true
              exit 1
            fi
            sleep 5
          done
          echo "::error::Timeout waiting for production migration job"
          kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=200 || true
          exit 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      # `deployments: write` für den GitHub-Deployment-Record am Ende (Audit).
      # KEIN `contents: write` — wir pushen nichts auf das (branch-protected) main.
      deployments: write
      contents: read
      packages: write
    needs: [resolve, migrate]
    # Damit der Deploy auch dann läuft, wenn migrate übersprungen wurde:
    if: always() && needs.resolve.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')

    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to production
        env:
          TAG: ${{ needs.resolve.outputs.image_tag }}
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${TAG} \
            -n "$NAMESPACE"
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${TAG} \
            -n "$NAMESPACE"

      - name: Wait for rollout
        id: rollout
        run: |
          set -e
          kubectl rollout status deployment/backend -n "$NAMESPACE" --timeout=300s
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=300s

      - name: Rollback on rollout failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "::error::Production rollout failed — rolling back"
          kubectl rollout undo deployment/backend -n "$NAMESPACE" || true
          kubectl rollout undo deployment/frontend -n "$NAMESPACE" || true
          exit 1

      - name: Smoke test
        id: smoke
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.colibri-app.ch/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "::notice::Smoke test passed (HTTP $STATUS)"

      - name: Rollback on smoke test failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke test failed — rolling back"
          kubectl rollout undo deployment/backend -n "$NAMESPACE" || true
          kubectl rollout undo deployment/frontend -n "$NAMESPACE" || true
          exit 1

      # Promotion-Anker für schnellen Rollback / "was läuft gerade?"-Abfragen.
      # Erst NACH erfolgreichem Smoke-Test taggen, damit ':production-current'
      # nicht auf ein kaputtes Image zeigt.
      - name: Log in to GHCR for tagging
        if: steps.smoke.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag images as production-current
        if: steps.smoke.outcome == 'success'
        env:
          TAG: ${{ needs.resolve.outputs.image_tag }}
        run: |
          docker buildx imagetools create \
            --tag ${{ env.BACKEND_IMAGE }}:production-current \
            ${{ env.BACKEND_IMAGE }}:${TAG}
          docker buildx imagetools create \
            --tag ${{ env.FRONTEND_IMAGE }}:production-current \
            ${{ env.FRONTEND_IMAGE }}:${TAG}
          echo "::notice::Tagged $TAG as production-current"

      # Audit-Log: jede erfolgreiche Promotion wird als GitHub-Deployment-Record
      # festgehalten (sichtbar im Deployments-Tab des Repos). Kein Commit/Push
      # auf das branch-protected `main` — der Record trägt Ziel-SHA, Vorgänger,
      # Operator, Migrations-Flag und Run-URL. Promotion-History ergibt sich
      # zusätzlich aus dem `:production-current`-Image-Tag und diesem Run-Log.
      - name: Record promotion as GitHub Deployment
        if: steps.smoke.outcome == 'success'
        uses: actions/github-script@v7
        env:
          TARGET: ${{ needs.resolve.outputs.image_tag }}
          PREVIOUS: ${{ needs.resolve.outputs.current_prod_tag }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations }}
        with:
          script: |
            const { TARGET, PREVIOUS, SKIP_MIGRATIONS } = process.env;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const description =
              `prod promotion ${TARGET.slice(0, 12)} (prev ${PREVIOUS}) ` +
              `by @${context.actor}` +
              (SKIP_MIGRATIONS === 'true' ? ' [migrations SKIPPED]' : '');

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              // Ziel-SHA als ref — der Record verweist exakt auf den promoteten Stand.
              ref: TARGET,
              environment: 'production',
              description,
              auto_merge: false,
              required_contexts: [],
              production_environment: true,
              transient_environment: false,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'production',
              environment_url: 'https://app.colibri-app.ch',
              log_url: runUrl,
              description,
            });

            core.notice(`Promotion als Deployment #${deployment.data.id} festgehalten: ${description}`);
