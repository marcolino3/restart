name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-frontend
  NAMESPACE: restart-staging

# Serialisiert Staging-Deploys: bei schnell aufeinanderfolgenden Merges nicht
# zwei Rollouts parallel fahren. Nicht abbrechen (cancel-in-progress: false),
# damit ein laufender Migrate/Rollout den Cluster nicht halbfertig verlässt.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # CI-Gate: lint, test, build, E2E. Schlägt einer fehl, werden gar keine
  # Images gebaut/gepusht und nichts deployed (build hat `needs: [ci]`).
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & Push Images
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # SARIF-Upload aus Trivy-Image-Scan in GitHub Security-Tab.
      security-events: write
    outputs:
      has_kubeconfig: ${{ steps.check.outputs.has_kubeconfig }}

    steps:
      - uses: actions/checkout@v6

      - name: Check if KUBE_CONFIG exists
        id: check
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "has_kubeconfig=true" >> $GITHUB_OUTPUT
          else
            echo "has_kubeconfig=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping deploy - KUBE_CONFIG secret not configured yet"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            BACKEND_URL=http://backend:3001
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

      # Image-Vulnerability-Scan — Build schlägt fehl bei CRITICAL.
      # Greift NACH dem Push, weil Trivy das pushed Image über GHCR pullt
      # (das schließt einen Bug aus, bei dem das gepushte Layer-Set ein
      # anderes als das lokal gebaute ist).
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          severity: "CRITICAL"
          # Gate: ein fixbares CRITICAL im Image bricht den Deploy ab.
          exit-code: "1"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-backend.sarif"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          severity: "CRITICAL"
          # Gate: ein fixbares CRITICAL im Image bricht den Deploy ab.
          exit-code: "1"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-frontend.sarif"

      - name: Upload backend image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-image-backend"

      - name: Upload frontend image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-image-frontend"

  migrate:
    name: Run DB Migrations
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.has_kubeconfig == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Apply migration job
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          # IMAGE_TAG = vollständiger SHA (matched das gepushte Image).
          # JOB_NAME_SUFFIX = gekürzt, weil k8s-Job-Namen max. 63 Zeichen.
          IMAGE_TAG: ${{ github.sha }}
        run: |
          export IMAGE_OWNER=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          JOB_NAME_SUFFIX=$(echo "$IMAGE_TAG" | cut -c1-12)
          JOB_NAME="migrate-${JOB_NAME_SUFFIX}"
          export JOB_NAME_SUFFIX
          envsubst < k8s/base/jobs/migrate-job.yaml | kubectl apply -n "$NAMESPACE" -f -

          echo "Waiting for $JOB_NAME to complete…"
          for i in $(seq 1 60); do
            COMPLETE=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" \
              -o 'jsonpath={.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
            FAILED=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" \
              -o 'jsonpath={.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")
            if [ "$COMPLETE" = "True" ]; then
              echo "::notice::Migrations applied"
              kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=50 || true
              exit 0
            fi
            if [ "$FAILED" = "True" ]; then
              echo "::error::Migration job failed"
              kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=200 || true
              exit 1
            fi
            sleep 5
          done
          echo "::error::Timeout waiting for migration job"
          kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=200 || true
          exit 1

  deploy:
    name: Deploy to Staging
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n "$NAMESPACE"
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n "$NAMESPACE"

      - name: Wait for rollout
        id: rollout
        run: |
          set -e
          kubectl rollout status deployment/backend -n "$NAMESPACE" --timeout=300s
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=300s

      - name: Rollback on rollout failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "::warning::Rollout failed — rolling back deployments"
          kubectl rollout undo deployment/backend -n "$NAMESPACE" || true
          kubectl rollout undo deployment/frontend -n "$NAMESPACE" || true

      # Health-Check gegen die öffentliche Staging-URL — verifiziert, dass der
      # neue Stand wirklich Requests beantwortet (nicht nur „Pods Ready").
      - name: Smoke test
        id: smoke
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.colibri-app.ch/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging smoke test failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "::notice::Staging smoke test passed (HTTP $STATUS)"

      - name: Rollback on smoke test failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke test failed — rolling back"
          kubectl rollout undo deployment/backend -n "$NAMESPACE" || true
          kubectl rollout undo deployment/frontend -n "$NAMESPACE" || true
          exit 1

      # Promotion-Anker: das jetzt auf Staging laufende Image-Paar zusätzlich
      # als ':staging-current' taggen. deploy-production.yml liest diesen Tag,
      # wenn der Operator keinen expliziten image_tag angibt.
      # `docker buildx imagetools create` kopiert nur das Manifest (kein Re-Pull
      # der Layer) und ist tag-only.
      - name: Log in to GHCR for tagging
        if: steps.smoke.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag images as staging-current
        if: steps.smoke.outcome == 'success'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.BACKEND_IMAGE }}:staging-current \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker buildx imagetools create \
            --tag ${{ env.FRONTEND_IMAGE }}:staging-current \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          echo "::notice::Tagged ${{ github.sha }} as staging-current"
