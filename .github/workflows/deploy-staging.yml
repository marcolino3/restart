name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-frontend
  NAMESPACE: restart-staging

# Serialisiert Staging-Deploys: bei schnell aufeinanderfolgenden Merges nicht
# zwei Rollouts parallel fahren. Nicht abbrechen (cancel-in-progress: false),
# damit ein laufender Migrate/Rollout den Cluster nicht halbfertig verlässt.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # CI-Gate: lint, test, build, E2E. Schlägt einer fehl, werden gar keine
  # Images gebaut/gepusht und nichts deployed (build hat `needs: [ci]`).
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & Push Images
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      # SARIF-Upload aus Trivy-Image-Scan in GitHub Security-Tab.
      security-events: write
    outputs:
      has_kubeconfig: ${{ steps.check.outputs.has_kubeconfig }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check if KUBE_CONFIG exists
        id: check
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "has_kubeconfig=true" >> $GITHUB_OUTPUT
          else
            echo "has_kubeconfig=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping deploy - KUBE_CONFIG secret not configured yet"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Buildx mit docker-container-Driver — Voraussetzung für den
      # GitHub-Actions-Layer-Cache (type=gha) der beiden Build-Steps.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            BACKEND_URL=http://backend:3001
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

      # Image-Vulnerability-Scan — Build schlägt fehl bei CRITICAL.
      # Greift NACH dem Push, weil Trivy das pushed Image über GHCR pullt
      # (das schließt einen Bug aus, bei dem das gepushte Layer-Set ein
      # anderes als das lokal gebaute ist).
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          severity: "CRITICAL"
          # Gate: ein fixbares CRITICAL im Image bricht den Deploy ab.
          exit-code: "1"
          ignore-unfixed: true
          # Default-Timeout (5m) reicht beim grossen node_modules-Baum nicht und
          # führte zu `context deadline exceeded` (Exit 1, kein echtes Finding).
          timeout: "15m"
          format: "sarif"
          output: "trivy-backend.sarif"
          # WICHTIG: Ohne dies erzwingt format=sarif intern ALLE Severities
          # ("Building SARIF report with all severities"), wodurch exit-code=1
          # auf JEDE Vuln (auch HIGH/MEDIUM) feuert — der Deploy bricht dann ab,
          # obwohl 0 CRITICAL im Image sind. true koppelt die SARIF an `severity`.
          limit-severities-for-sarif: true

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          severity: "CRITICAL"
          # Gate: ein fixbares CRITICAL im Image bricht den Deploy ab.
          exit-code: "1"
          ignore-unfixed: true
          timeout: "15m"
          format: "sarif"
          output: "trivy-frontend.sarif"
          # Siehe Backend-Scan: ohne dies gated der „CRITICAL"-Scan faktisch
          # auf alle Severities.
          limit-severities-for-sarif: true

      - name: Upload backend image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-image-backend"

      - name: Upload frontend image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-image-frontend"

  migrate:
    name: Run DB Migrations
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.build.outputs.has_kubeconfig == 'true'
    permissions:
      contents: read
      packages: read # GITHUB_TOKEN darf die privaten GHCR-Images pullen (Fallback)

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # Ohne diesen Secret kann der Cluster die privaten GHCR-Images nicht
      # ziehen (ImagePullBackOff). Bei jedem Deploy frisch erzeugt, damit ein
      # abgelaufenes Token sich selbst heilt.
      #  - Bevorzugt GHCR_PULL_TOKEN (langlebiger classic PAT mit read:packages):
      #    überlebt Pod-Neustarts/Scale-ups auch zwischen Deploys.
      #  - Fällt sonst auf den eingebauten GITHUB_TOKEN zurück (job hat
      #    packages:read). Funktioniert für diesen Deploy-Run, läuft aber nach
      #    Workflow-Ende ab — für restart-resiliente Pulls den PAT hinterlegen.
      - name: Ensure GHCR image pull secret
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$GHCR_PULL_TOKEN" ]; then
            TOKEN="$GHCR_PULL_TOKEN"
            USERNAME="$IMAGE_OWNER"
          else
            echo "::warning::GHCR_PULL_TOKEN not set — using the ephemeral GITHUB_TOKEN. Pulls work for this deploy but the token expires when the run ends; add a read:packages PAT as GHCR_PULL_TOKEN for restart-resilient pulls."
            TOKEN="$GITHUB_TOKEN"
            USERNAME="$ACTOR"
          fi
          OWNER_LC=$(echo "$USERNAME" | tr '[:upper:]' '[:lower:]')
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="$OWNER_LC" \
            --docker-password="$TOKEN" \
            -n "$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -n "$NAMESPACE" -f -
          echo "::notice::ghcr-secret ensured in $NAMESPACE"

      - name: Apply migration job
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          # IMAGE_TAG = vollständiger SHA (matched das gepushte Image).
          # JOB_NAME_SUFFIX = gekürzt, weil k8s-Job-Namen max. 63 Zeichen.
          IMAGE_TAG: ${{ github.sha }}
        run: |
          export IMAGE_OWNER=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          JOB_NAME_SUFFIX=$(echo "$IMAGE_TAG" | cut -c1-12)
          JOB_NAME="migrate-${JOB_NAME_SUFFIX}"
          export JOB_NAME_SUFFIX
          envsubst < k8s/base/jobs/migrate-job.yaml | kubectl apply -n "$NAMESPACE" -f -

          echo "Waiting for $JOB_NAME to complete…"
          for i in $(seq 1 60); do
            COMPLETE=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" \
              -o 'jsonpath={.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
            FAILED=$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" \
              -o 'jsonpath={.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")
            if [ "$COMPLETE" = "True" ]; then
              echo "::notice::Migrations applied"
              kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=50 || true
              exit 0
            fi
            if [ "$FAILED" = "True" ]; then
              echo "::error::Migration job failed"
              kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=200 || true
              exit 1
            fi
            sleep 5
          done
          echo "::error::Timeout waiting for migration job"
          kubectl logs -n "$NAMESPACE" "job/$JOB_NAME" --tail=200 || true
          exit 1

  deploy:
    name: Deploy to Staging
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # GitOps-Sync: ConfigMaps/Secrets/Manifeste auf den Repo-Stand bringen,
      # BEVOR das Image gepinnt wird. Bisher deployte der Workflow nur das Image
      # (set image), wodurch Config-/Secret-Änderungen nie ankamen — genau so
      # blieb DB_SYNCHRONIZE=true im Cluster und liess jeden neuen Pod im Boot
      # crashen. `apply -k` ist idempotent; das Deployment erhält hier kurz den
      # Base-:latest-Tag, der direkt danach von `set image` auf den exakten SHA
      # überschrieben wird.
      - name: Sync manifests (kustomize)
        run: kubectl apply -k k8s/staging

      - name: Deploy to staging
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n "$NAMESPACE"
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n "$NAMESPACE"

      - name: Wait for rollout
        id: rollout
        run: |
          set -e
          kubectl rollout status deployment/backend -n "$NAMESPACE" --timeout=300s
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=300s

      # Bei Rollout-Timeout den Cluster-Zustand dumpen, BEVOR der Rollback
      # (nächster Step) den hängenden Pod samt Events wegräumt. Jeder Befehl
      # mit `|| true`, damit die Diagnose selbst nie den Job abbricht.
      # Zielt auf den beobachteten "old replicas pending termination"-Hänger:
      # deletionTimestamp+finalizers zeigen einen stuck-Terminating-Pod,
      # Node-Status einen NotReady-Node, Events den Eviction-/Kill-Grund.
      - name: Diagnose on rollout failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "::group::Pods (wide)"
          kubectl get pods -n "$NAMESPACE" -o wide || true
          echo "::endgroup::"

          echo "::group::ReplicaSets"
          kubectl get rs -n "$NAMESPACE" -o wide || true
          echo "::endgroup::"

          echo "::group::Deployment backend (describe)"
          kubectl describe deployment/backend -n "$NAMESPACE" || true
          echo "::endgroup::"

          echo "::group::Backend pods (describe — Events, State, Conditions)"
          kubectl describe pods -n "$NAMESPACE" -l app=backend || true
          echo "::endgroup::"

          echo "::group::Terminating-Check (deletionTimestamp / finalizers / phase)"
          kubectl get pods -n "$NAMESPACE" -l app=backend \
            -o jsonpath='{range .items[*]}{.metadata.name}{"  deletionTimestamp="}{.metadata.deletionTimestamp}{"  finalizers="}{.metadata.finalizers}{"  phase="}{.status.phase}{"\n"}{end}' || true
          echo ""
          echo "::endgroup::"

          echo "::group::Recent events (last 60)"
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp 2>/dev/null | tail -60 || true
          echo "::endgroup::"

          echo "::group::Nodes (wide + conditions)"
          kubectl get nodes -o wide || true
          kubectl describe nodes | grep -A6 -iE "^Name:|Conditions:|MemoryPressure|DiskPressure|Ready " || true
          echo "::endgroup::"

          echo "::group::PodDisruptionBudgets"
          kubectl get pdb -n "$NAMESPACE" -o wide || true
          echo "::endgroup::"

          echo "::group::Backend pod logs (current + previous)"
          for p in $(kubectl get pods -n "$NAMESPACE" -l app=backend -o name 2>/dev/null); do
            echo "--- $p (current, tail 60) ---"
            kubectl logs -n "$NAMESPACE" "$p" --tail=60 || true
            echo "--- $p (previous, tail 60) ---"
            kubectl logs -n "$NAMESPACE" "$p" --tail=60 --previous || true
          done
          echo "::endgroup::"

      - name: Rollback on rollout failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "::warning::Rollout failed — rolling back deployments"
          kubectl rollout undo deployment/backend -n "$NAMESPACE" || true
          kubectl rollout undo deployment/frontend -n "$NAMESPACE" || true

      # Health-Check gegen die öffentliche Staging-URL — verifiziert, dass der
      # neue Stand wirklich Requests beantwortet (nicht nur „Pods Ready").
      - name: Smoke test
        id: smoke
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.colibri-app.ch/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging smoke test failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "::notice::Staging smoke test passed (HTTP $STATUS)"

      - name: Rollback on smoke test failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke test failed — rolling back"
          kubectl rollout undo deployment/backend -n "$NAMESPACE" || true
          kubectl rollout undo deployment/frontend -n "$NAMESPACE" || true
          exit 1

      # Promotion-Anker: das jetzt auf Staging laufende Image-Paar zusätzlich
      # als ':staging-current' taggen. deploy-production.yml liest diesen Tag,
      # wenn der Operator keinen expliziten image_tag angibt.
      # `docker buildx imagetools create` kopiert nur das Manifest (kein Re-Pull
      # der Layer) und ist tag-only.
      - name: Log in to GHCR for tagging
        if: steps.smoke.outcome == 'success'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag images as staging-current
        if: steps.smoke.outcome == 'success'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.BACKEND_IMAGE }}:staging-current \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker buildx imagetools create \
            --tag ${{ env.FRONTEND_IMAGE }}:staging-current \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          echo "::notice::Tagged ${{ github.sha }} as staging-current"
