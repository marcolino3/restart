name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restart-frontend

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      has_kubeconfig: ${{ steps.check.outputs.has_kubeconfig }}

    steps:
      - uses: actions/checkout@v4

      - name: Check if KUBE_CONFIG exists
        id: check
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "has_kubeconfig=true" >> $GITHUB_OUTPUT
          else
            echo "has_kubeconfig=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping deploy - KUBE_CONFIG secret not configured yet"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            BACKEND_URL=http://backend:3001
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.has_kubeconfig == 'true'

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n restart-staging
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n restart-staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n restart-staging --timeout=300s
          kubectl rollout status deployment/frontend -n restart-staging --timeout=300s
