name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    # Wöchentlich Montag 04:00 UTC — fängt Schwachstellen in
    # ungeänderten Pfaden auf, sobald CodeQL neue Regeln hat.
    - cron: "0 4 * * 1"

# CodeQL braucht keine PR-Write-Rechte; minimal halten.
permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # JS-Analyse deckt sowohl JavaScript als auch TypeScript ab.
        language: ["javascript-typescript"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          # Security-extended + quality: deutlich mehr Regeln als Default,
          # findet z. B. Prototype-Pollution, unsichere Deserialization,
          # SSRF-Patterns, hardcoded Secrets in Tests.
          queries: security-extended,security-and-quality

      # Build-Schritt für JS/TS optional — autobuild reicht.
      # Falls CodeQL ohne Build false-positives produziert, manuellen
      # pnpm build hier ergänzen.
      - name: Autobuild
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:${{ matrix.language }}"
