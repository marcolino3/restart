name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - run: npm install -g npm@11
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: colibri_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g npm@11

      - name: Install Backend
        run: cd apps/backend && npm ci

      - name: Install Frontend
        run: cd apps/web && npm install

      - name: Install E2E
        run: cd e2e && npm ci

      - name: Install Playwright Browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: cd e2e && npx playwright test
        env:
          # Database
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: colibri_test
          DB_USERNAME: test
          DB_PASSWORD: test
          DB_SYNCHRONIZE: "true"
          # App
          NODE_ENV: test
          PORT: 4001
          ALLOWED_ORIGINS: http://localhost:4000
          # JWT
          JWT_ACCESS_TOKEN_SECRET: ci-test-access-secret-key
          JWT_ACCESS_TOKEN_EXPIRATION_MS: "900000"
          JWT_REFRESH_TOKEN_SECRET: ci-test-refresh-secret-key
          JWT_REFRESH_TOKEN_EXPIRATION_MS: "604800000"
          # Google OAuth (dummy values – backend requires non-empty strings at startup)
          GOOGLE_AUTH_CLIENT_ID: ci-test-google-client-id
          GOOGLE_AUTH_CLIENT_SECRET: ci-test-google-client-secret
          GOOGLE_AUTH_REDIRECT_URI: http://localhost:4001/api/auth/google/redirect
          # Auth
          AUTH_UI_REDIRECT: http://localhost:4000
          # Mail (dummy values – not actually used in E2E smoke tests)
          SMTP_USER: ci-test@example.com
          GOOGLE_MAIL_REFRESH_TOKEN: ci-test-mail-refresh-token
          # Google Calendar
          GOOGLE_CALENDAR_ID: ci-test-calendar-id
          # Encryption
          ORG_SETTINGS_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          # Frontend
          NEXT_PUBLIC_API_URL: http://localhost:4001
          NEXT_PUBLIC_GRAPHQL_API_URL: http://localhost:4001/graphql
          BACKEND_URL: http://localhost:4001
