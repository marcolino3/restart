name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Täglich 03:00 UTC — fängt frische CVEs in Dependencies auf.
    - cron: "0 3 * * *"

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blockt PRs, die Dependencies mit bekannten Vulnerabilities (>= high)
  # einführen — prüft den Diff der Manifeste, nicht den ganzen Baum
  # (Komplement zu pnpm audit, das den Ist-Zustand prüft).
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history damit gitleaks auch alte Commits scannt.
          # Auf großen Repos später auf depth: 50 begrenzen, hier reicht 0.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free / OSS-Mode: kein Lizenz-Token nötig.
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_SUMMARY: true

  trivy-fs:
    name: Filesystem Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Stufe 1 — REPORT: CRITICAL + HIGH ins GitHub-Security-Tab.
      # Blockt NICHT (exit-code 0), damit bekannte, nicht ohne Breaking-Change
      # fixbare transitive HIGH-CVEs (z. B. immutable < 4.3.8 via graphql-codegen,
      # siehe MEMORY.md) den Build nicht dauerhaft rot färben. Sichtbar bleiben sie.
      - name: Run Trivy filesystem scan (report)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          # Scope: Manifests + Lockfiles + Dockerfiles + IaC. Findet:
          # - npm/pnpm Vulnerabilities (auch transitive)
          # - K8s-Manifest-Misconfigs (privileged, runAsRoot, etc.)
          # - Dockerfile-Issues (latest-Tag, COPY chown, USER root)
          scanners: "vuln,misconfig,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-fs-results.sarif"

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-fs"

      # Stufe 2 — GATE: fixbare CRITICAL brechen den Build ab.
      # Nutzt den lokalen Trivy-Cache aus Stufe 1 (kein erneuter DB-Download).
      # Akzeptierte Findings via .trivyignore (CVE-ID + Begründung) ausblenden.
      - name: Trivy filesystem scan (CRITICAL gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,misconfig,secret"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          format: "table"

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Production deps strikt: HIGH+ failed den Build.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: false

      # Dev-deps: nur reporten, nicht failen — sonst blockieren Vitest/ESLint
      # Transitive-CVEs jedes Update.
      - name: Audit all dependencies (report only)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
