language: de-DE
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/*.generated.ts"
    - "!**/*.generated.tsx"
    - "!apps/web/gql/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!pnpm-lock.yaml"
    - "!apps/web/messages/**"
  path_instructions:
    - path: "apps/backend/src/**/*.resolver.ts"
      instructions: |
        Prüfe Multi-Tenant-Isolation: Jede Query/Mutation muss gegen
        req.user.orgId filtern. Globale Operationen brauchen @SuperAdminOnly().
        Mutations brauchen @Permissions() oder @SuperAdminOnly().
    - path: "apps/backend/src/**/*.entity.ts"
      instructions: |
        Sensitive Felder müssen mit @HideField() aus GraphQL ausgeschlossen
        werden (Passwörter, Tokens, interne Flags).
    - path: "apps/web/features/**/actions/*.action.ts"
      instructions: |
        Server Actions müssen Zod-validieren und authentifiziert sein.
        Keine sensitiven Daten in Client-Logs.
    - path: "k8s/**/*.yaml"
      instructions: |
        Keine Klartext-Secrets in committeten YAMLs. SecurityContext
        und resource limits sollten gesetzt sein.
  tools:
    github-checks:
      enabled: true
    languagetool:
      enabled: false
chat:
  auto_reply: true